name: Daily Asana Report
on:
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install requests httpx
      - run: python daily_task_report.py
        env:
          ASANA_TOKEN: ${{ secrets.ASANA_TOKEN }}
          ASANA_PROJECT_GID: ${{ secrets.ASANA_PROJECT_GID }}
          SEATALK_APP_ID: ${{ secrets.SEATALK_APP_ID }}
          SEATALK_APP_SECRET: ${{ secrets.SEATALK_APP_SECRET }}
          SEATALK_GROUP_ID: ${{ secrets.SEATALK_GROUP_ID }}
